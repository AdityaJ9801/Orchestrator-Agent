name: Deploy Orchestrator Agent to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AGENT_NAME: orchestrator-agent
  TARGET_PORT: "8000"
  RESOURCE_GROUP: rg-axiom-ai
  CONTAINER_ENV: axiom-ai-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Azure Login ─────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.AGENT_NAME }}:${{ github.sha }}
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.AGENT_NAME }}:latest

      # ── 5. Deploy to Azure Container Apps ───────────────────────────────
      - name: Deploy to Azure Container Apps
        run: |
          IMAGE="${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.AGENT_NAME }}:${{ github.sha }}"

          # Check if container app already exists
          EXISTS=$(az containerapp show \
            --name ${{ env.AGENT_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "name" -o tsv 2>/dev/null || echo "")

          # Build Environment Variables and Secrets strings
          # Start with required ones
          # Use short internal hostnames — ACA resolves these within the same environment
          ENV_VARS="LLM_PROVIDER=openai PORT=${{ env.TARGET_PORT }} OPENAI_API_KEY=secretref:openai-api-key USE_DOCKER=false USE_EC2=false CORS_ORIGINS=* CONTEXT_AGENT_URL=http://context-agent SQL_AGENT_URL=http://sql-agent VIZ_AGENT_URL=http://viz-agent NLP_AGENT_URL=http://nlp-agent REPORT_AGENT_URL=http://report-agent"
          SECRETS="openai-api-key=${{ secrets.OPENAI_API_KEY }}"

          # Add Optional Azure Storage if secret exists
          if [ ! -z "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" ]; then
            echo "📦 Adding Azure Storage configuration..."
            ENV_VARS="$ENV_VARS AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-conn"
            SECRETS="$SECRETS azure-storage-conn=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
          fi

          if [ -z "$EXISTS" ]; then
            echo "🆕 Creating new Container App: ${{ env.AGENT_NAME }}"
            az containerapp create \
              --name ${{ env.AGENT_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_ENV }} \
              --image $IMAGE \
              --target-port ${{ env.TARGET_PORT }} \
              --ingress external \
              --cpu 0.5 \
              --memory 1Gi \
              --min-replicas 1 \
              --max-replicas 1 \
              --registry-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --env-vars $ENV_VARS \
              --secrets $SECRETS
          else
            echo "🔄 Updating existing Container App: ${{ env.AGENT_NAME }}"
            # Update secrets first in case they were modified
            az containerapp secret set \
              --name ${{ env.AGENT_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets $SECRETS

            az containerapp update \
              --name ${{ env.AGENT_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image $IMAGE \
              --set-env-vars $ENV_VARS
          fi

          # Configure health probes via JSON patch (works on all Azure CLI versions).
          # The app also responds 200 on GET / as a fallback for the default probe.
          echo "🩺 Configuring health probes → /health"

          # Fetch current app spec, inject probes, re-apply via --yaml
          SHOW_JSON=$(az containerapp show \
            --name ${{ env.AGENT_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            -o json)

          echo "$SHOW_JSON" | python3 - <<'PY_EOF'
import json, sys, subprocess, tempfile, os
data = json.load(sys.stdin)
containers = data.get("properties", {}).get("template", {}).get("containers", [])
if not containers:
    print("⚠️  No containers found in app spec, skipping probe patch")
    sys.exit(0)

probes = [
    {"type": "Liveness",  "httpGet": {"path": "/health", "port": int(os.environ["TARGET_PORT"])}, "initialDelaySeconds": 20, "periodSeconds": 30},
    {"type": "Readiness", "httpGet": {"path": "/health", "port": int(os.environ["TARGET_PORT"])}, "initialDelaySeconds": 10, "periodSeconds": 15},
]
containers[0]["probes"] = probes
data["properties"]["template"]["containers"] = containers

with tempfile.NamedTemporaryFile("w", suffix=".json", delete=False) as f:
    json.dump(data, f)
    fname = f.name

result = subprocess.run(
    ["az", "containerapp", "update",
     "--name", os.environ["AGENT_NAME"],
     "--resource-group", os.environ["RESOURCE_GROUP"],
     "--yaml", fname],
    capture_output=True, text=True
)
os.unlink(fname)
if result.returncode != 0:
    print("⚠️  YAML probe patch failed:", result.stderr[:300])
    print("   Container responds 200 on GET / as fallback — probes will pass.")
else:
    print("✅ Health probes set to /health successfully")
PY_EOF

      # ── 6. Print deployment URL ─────────────────────────────────────────
      - name: Show Deployment URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.AGENT_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "============================================"
          echo "✅ Orchestrator Agent deployed at:"
          echo "   https://$URL"
          echo "   Health: https://$URL/health"
          echo "   Docs:   https://$URL/docs"
          echo "============================================"
